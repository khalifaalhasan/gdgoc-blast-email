version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: blast_email_redis
    ports:
      - "6379:6379"
    restart: always

  # Redis GUI Console (Bisa diakses dari browser)
  redisinsight:
    image: redis/redisinsight:latest
    container_name: blast_email_redis_console
    ports:
      - "8001:5540"
    restart: always
    depends_on:
      - redis

  db:
    image: postgres:15-alpine
    container_name: blast_email_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blast_email
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
