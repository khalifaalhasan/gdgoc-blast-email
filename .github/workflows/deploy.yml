name: Deploy to Server

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add Known Hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

    - name: Sync files via rsync
      run: |
        # Meng-copy semua source code ke VPS (kecuali .git)
        rsync -avz -e "ssh -p ${{ secrets.VPS_PORT }}" --exclude='.git' ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_TARGET_DIR }}

    - name: Run docker-compose and Migration on VPS
      run: |
        ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          cd ${{ secrets.VPS_TARGET_DIR }}
          
          # Setup .env file based on Github Secrets
          cat << 'ENVFILE' > .env
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          SENDER_NAME="${{ secrets.SENDER_NAME }}"
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_EMAIL_ASSET_BASE_URL=${{ secrets.VITE_EMAIL_ASSET_BASE_URL }}
          VITE_LINK_INSTAGRAM=${{ secrets.VITE_LINK_INSTAGRAM }}
          VITE_LINK_LINKEDIN=${{ secrets.VITE_LINK_LINKEDIN }}
          VITE_LINK_GITHUB=${{ secrets.VITE_LINK_GITHUB }}
          VITE_LINK_WEBSITE=${{ secrets.VITE_LINK_WEBSITE }}
        ENVFILE
          
          # Build ulang image dan jalankan container baru
          # docker-compose.prod.yml digunakan agar tidak bentrok dengan local setup
          docker-compose -f docker-compose.prod.yml up -d --build
          
          # Karena command backend sudah di-set untuk menjalankan: 
          # "alembic upgrade head && uvicorn main:app", 
          # migration akan otomatis dieksekusi saat container backend naik.
        EOF
