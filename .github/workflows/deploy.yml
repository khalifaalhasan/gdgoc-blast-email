name: Deploy to Server

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add Known Hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

    - name: Write Google Credentials to backend/
      run: |
        # Decode base64 secrets dan tulis ke folder backend/ sebelum rsync
        # Cara membuat secret-nya (jalankan sekali di lokal):
        #   cat backend/credentials.json | base64 -w 0   → simpan sebagai GOOGLE_CREDENTIALS_JSON
        echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" | base64 -d > backend/credentials.json

    - name: Sync files via rsync
      run: |
        # Copy semua source code + credentials ke VPS (kecuali .git)
        rsync -avz -e "ssh -p ${{ secrets.VPS_PORT }}" --exclude='.git' ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_TARGET_DIR }}

    - name: Run docker-compose and Migration on VPS
      run: |
        ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          cd ${{ secrets.VPS_TARGET_DIR }}
          
          # Setup .env file based on Github Secrets
          cat << 'ENVFILE' > .env
        ${{ secrets.ENV_BE }}
        
        ${{ secrets.ENV_FE }}
        ENVFILE
          
          # Build ulang image dan jalankan container baru
          # Rename file docker-compose agar menjadi default (tanpa akhiran prod)
          mv docker-compose.prod.yml docker-compose.yml
          docker-compose up -d --build
          
          # Karena command backend sudah di-set untuk menjalankan:
          # "alembic upgrade head && uvicorn main:app",
          # migration akan otomatis dieksekusi saat container backend naik.
        EOF
